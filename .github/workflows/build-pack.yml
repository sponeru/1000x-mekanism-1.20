name: Build Packs
on:
  workflow_dispatch:
    inputs:
      ver:
        type: string
        required: true
        description: "version"

jobs:
  build:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v4

      - name: short-sha
        uses: benjlevesque/short-sha@v3.0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Packwiz
        uses: actionhippie/install-packwiz@v1

      - name: Build Packs
        run: |
          packwiz curseforge export -o "extraordinary_energy_modern-${{ inputs.ver }}.zip"
          packwiz curseforge export -s server -o "extraordinary_energy_modern-server-${{ inputs.ver }}.zip"

      - name: Unpack Client Pack
        run: | 
          mkdir -p ./build/client
          unzip "extraordinary_energy_modern-${{ inputs.ver }}.zip" -d ./build/client
          rm -rf ./build/client/.github
          cp ./build/client/overrides/LICENSE ./build/client/LICENSE
          rm -rf ./build/client/overrides/LICENSE

      - name: Unpack Server Pack
        run: | 
          mkdir -p ./build/server
          unzip "extraordinary_energy_modern-server-${{ inputs.ver }}.zip" -d ./build/server
          rm -rf ./build/server/.github
          cp ./build/server/overrides/LICENSE ./build/server/LICENSE
          rm -rf ./build/server/overrides/LICENSE

      - name: Upload Client build result
        uses: actions/upload-artifact@v4
        with:
          name: extraordinary_energy_modern-${{ inputs.ver }}
          path: ./build/client/
          retention-days: 30

      - name: Upload Server build result
        uses: actions/upload-artifact@v4
        with:
          name: extraordinary_energy_modern-server-${{ inputs.ver }}
          path: ./build/server/
          retention-days: 30